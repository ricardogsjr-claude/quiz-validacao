/* fontes carregadas via <link> no <head> — whatsapp-friendly */
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg-page);color:var(--text-body);font-family:var(--sans);line-height:1.7;-webkit-font-smoothing:antialiased;min-height:100vh}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px}
.kicker{font-family:var(--sans);font-weight:700;font-size:10px;letter-spacing:var(--tracking-label);text-transform:uppercase;color:var(--gold-text)}
.label{font-family:var(--sans);font-weight:700;font-size:10px;letter-spacing:var(--tracking-label);text-transform:uppercase;color:var(--text-muted)}
h1{font-family:var(--serif);font-weight:800;font-size:clamp(1.9rem,5.6vw,2.8rem);line-height:1.08;color:var(--text-dark)}
h2{font-family:var(--serif);font-weight:800;font-size:clamp(1.4rem,4vw,1.95rem);line-height:1.12;color:var(--text-dark)}
h3{font-family:var(--serif);font-weight:600;font-size:1.2rem;color:var(--text-dark)}
p{font-size:15px;line-height:1.78;color:var(--text-body);margin:0 0 1em}
p b{color:var(--text-dark);font-weight:700}
.lead{font-size:1.12rem;color:var(--text-secondary)}
.rule{width:54px;height:2px;background:var(--gold);margin:16px 0}
.hero{width:100%;aspect-ratio:3/2;background:var(--hero) center/cover no-repeat,var(--bg-dark);border:1px solid var(--gold-border-soft);border-radius:var(--radius);margin:0 0 22px}
.muted{color:var(--text-muted);font-family:var(--sans);font-size:.82rem}
.val{font-family:var(--serif);color:var(--gold-text);font-weight:800}

#app{min-height:100vh;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;background:var(--bg-page);border-bottom:1px solid var(--gold-border-soft);z-index:5}
.topbar .wrap{display:flex;align-items:center;gap:12px;height:54px}
.brand{font-family:var(--serif);font-weight:800;font-size:.92rem;letter-spacing:.02em;color:var(--text-dark)}
.brand i{font-style:normal;color:var(--gold)}
.progress{flex:1;height:4px;background:var(--seg-empty);border-radius:1px;overflow:hidden}
.progress>i{display:block;height:100%;width:0;background:var(--gold);transition:width .35s ease}
.pcount{font-family:var(--mono);font-weight:500;font-size:.72rem;color:var(--text-muted);min-width:42px;text-align:right}
.screen{flex:1;display:flex;flex-direction:column;justify-content:center;padding:clamp(26px,7vw,56px) 0}
.back{background:none;border:0;color:var(--text-muted);font-family:var(--sans);font-weight:700;font-size:.78rem;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;padding:8px 0;margin-bottom:10px}
.back:hover{color:var(--gold-text)}
.qsub{margin:10px 0 24px;font-size:1rem;color:var(--text-secondary)}

.opts{display:flex;flex-direction:column;gap:11px}
.opt{display:flex;align-items:center;gap:14px;width:100%;text-align:left;background:var(--bg-white);border:1px solid var(--gold-border-soft);border-radius:var(--radius);padding:16px 18px;cursor:pointer;font-family:var(--sans);font-size:1rem;color:var(--text-body);transition:border-color .15s,box-shadow .15s}
.opt:hover{border-color:var(--gold)}
.opt .mk{font-size:1.3rem;line-height:1;flex:0 0 auto}
.opt.sel{border-color:var(--gold);box-shadow:inset 3px 0 0 var(--gold)}
.opt .ck{margin-left:auto;width:16px;height:16px;border:1px solid var(--gold-border);flex:0 0 auto;transform:rotate(45deg)}
.opt.sel .ck{background:var(--gold);border-color:var(--gold)}
.multi-note{margin:13px 0 0;color:var(--text-muted);font-size:.8rem}

.scale{display:grid;grid-template-columns:repeat(11,1fr);gap:5px;margin:8px 0 6px}
.scale button{aspect-ratio:1;border:1px solid var(--gold-border-soft);background:var(--bg-white);border-radius:var(--radius);font-family:var(--mono);font-weight:500;color:var(--text-secondary);cursor:pointer;font-size:.92rem;transition:background .15s,border-color .15s,color .15s}
.scale button:hover{border-color:var(--gold)}
.scale button.sel{background:var(--gold);border-color:var(--gold);color:#1a1410}
.scale-ends{display:flex;justify-content:space-between;color:var(--text-muted);font-size:.74rem;margin-bottom:18px}

.field{margin:0 0 14px}
.field label{display:block;font-family:var(--sans);font-weight:700;font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;color:var(--text-dark);margin:0 0 6px}
.field input,.field textarea{width:100%;font-family:var(--sans);font-size:1rem;color:var(--text-dark);background:var(--bg-white);border:1px solid var(--gold-border);border-radius:var(--radius);padding:13px 14px;transition:border-color .15s,box-shadow .15s}
.field input::placeholder,.field textarea::placeholder{color:var(--text-muted)}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 2px var(--gold-border-soft)}
.field.bad input{border-color:var(--red)}
.field .err{color:var(--red);font-size:.74rem;margin-top:5px;display:none}
.field.bad .err{display:block}
.consent{display:flex;gap:10px;align-items:flex-start;margin:8px 0 20px;font-size:.82rem;color:var(--text-secondary)}
.consent input{margin-top:4px;accent-color:var(--gold)}

.cta{display:inline-block;width:100%;text-align:center;font-family:var(--sans);font-weight:700;letter-spacing:.03em;background:var(--gold);color:#1a1410;text-decoration:none;border:0;padding:16px 24px;border-radius:var(--radius);cursor:pointer;font-size:1rem;text-transform:uppercase;transition:background .15s,color .15s}
.cta:hover{background:var(--gold-bright)}
.cta.ghost{background:transparent;color:var(--text-dark);border:1px solid var(--gold-border)}
.cta.ghost:hover{background:var(--gold-glow)}
.cta-row{display:flex;flex-direction:column;gap:10px;margin-top:8px}

.result{padding:clamp(22px,6vw,44px) 0}
.printhead{display:none}
.diagnum{display:flex;align-items:baseline;gap:12px;margin:6px 0}
.diagnum .big{font-family:var(--serif);font-weight:800;font-size:3rem;color:var(--red);line-height:1}
.segbar{display:flex;gap:5px;margin:14px 0 6px}
.segbar .seg{flex:1;height:10px;border-radius:1px;background:rgba(255,255,255,0.14);position:relative;overflow:hidden}
.segbar .seg i{position:absolute;inset:0;background:var(--gold-bright)}
.segbar .seg.red i{background:var(--red-soft)}
.gauge-ends{display:flex;justify-content:space-between;color:var(--text-muted);font-size:.74rem}
.card{background:var(--bg-white);border:1px solid var(--gold-border-soft);border-radius:var(--radius);padding:22px;margin:18px 0}
.darkcard{background:var(--bg-dark);color:var(--text-on-dark);padding:24px;margin:18px 0;border-radius:var(--radius)}
.darkcard .label{color:var(--gold-bright)}
.darkcard p{color:var(--text-on-dark-sub)}
.darkcard .val{color:var(--gold-bright)}
.beliefs{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:14px 0}
.beliefs .b{background:var(--bg-white);border:1px solid var(--gold-border-soft);padding:14px}
.beliefs .b .t{font-weight:700;font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px}
.beliefs .antes .t{color:var(--text-muted)}.beliefs .depois .t{color:var(--gold-text)}
.guide ol{margin:10px 0 0;padding-left:18px}
.guide li{margin:0 0 9px;line-height:1.6;color:var(--text-body)}
.guide li::marker{color:var(--gold)}
.qw{border-left:3px solid var(--gold);background:var(--bg-white);padding:14px 16px;margin:14px 0}
.win{display:flex;gap:10px;margin:8px 0;align-items:flex-start}
.win .mk{color:var(--gold)}
.foot-note{font-size:.78rem;color:var(--text-muted);margin-top:22px;border-top:1px solid var(--gold-border-soft);padding-top:16px}
.deltawrap{display:flex;gap:18px;align-items:center;justify-content:center;margin:10px 0}
.delta{text-align:center}
.delta .n{font-family:var(--serif);font-weight:800;font-size:2.4rem;line-height:1}
.delta.antes .n{color:var(--text-muted)}.delta.depois .n{color:var(--green)}
.arrow{font-size:1.4rem;color:var(--gold)}

.stepper{display:flex;gap:6px;margin:18px 0 8px;flex-wrap:wrap}
.stepper .st{flex:1;min-width:130px;display:flex;align-items:center;gap:8px;padding:9px 11px;border:1px solid var(--gold-border-soft);background:var(--bg-white);font-size:.72rem;font-weight:600;color:var(--text-muted)}
.stepper .st .dot{width:20px;height:20px;background:var(--seg-empty);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:500;flex:0 0 auto}
.stepper .st.on{border-color:var(--gold);color:var(--text-dark)}
.stepper .st.on .dot{background:var(--gold)}
.stepper .st.done .dot{background:var(--green)}

#admin-view{display:none;padding:30px 0}
.adm-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin:12px 0}
.adm-kpi{background:var(--bg-white);border:1px solid var(--gold-border-soft);padding:12px}
.adm-kpi .v{font-family:var(--serif);font-weight:800;font-size:1.5rem;color:var(--text-dark)}
.adm-kpi .k{font-size:.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em}
.adm-card{background:var(--bg-white);border:1px solid var(--gold-border-soft);padding:16px;margin:12px 0}
.lead-row{border-top:1px solid var(--gold-border-soft);padding:12px 0;font-size:.86rem}
.stars{color:var(--gold);letter-spacing:2px}
.wbtn{display:inline-block;background:var(--green);color:#fff;text-decoration:none;font-weight:700;font-size:.76rem;padding:6px 12px;margin-top:6px}
.tag{display:inline-block;font-weight:700;font-size:.66rem;text-transform:uppercase;letter-spacing:.06em;padding:3px 8px;background:var(--bg-page);border:1px solid var(--gold-border-soft);color:var(--text-secondary)}

@media (max-width:420px){.scale{gap:3px}.scale button{font-size:.8rem}.beliefs{grid-template-columns:1fr}.stepper .st .lbl{display:none}.stepper .st{min-width:0;justify-content:center}}
@media print{.topbar,.back,.cta,.cta-row,#admin-view{display:none!important}.printhead{display:block!important}body{background:#fff}}

  return `<div class="segbar">${segs}</div>`;
}

  if(A._saved) return; A._saved=true;
  const rec={modo:MODE,data:nowISO(),inicio:startedAt,contato:A.contato||{},respostas:A,
    perfil:{furo:p.raiz,furoNome:(RAIZ[p.raiz]||{}).leak,banda:p.band,furosAbertos:p.sinais,vazamento:p.current,disposicao:p.willing,icp:p.icp,faturamento:p.size,sobra:p.rel,jaTentou:p.tentou,perdaPercebida:p.perda,relacaoDesafio:p.branch,aplicou:p.aplicou,antes:p.antes,depoimento:p.depo},
    estrelas:st.star,score:st.score,acao:action(p,st)};
  try{ const all=JSON.parse(localStorage.getItem("r01_leads")||"[]"); all.push(rec); localStorage.setItem("r01_leads",JSON.stringify(all)); }catch(e){}
  if(CFG.LEAD_WEBHOOK&&CFG.LEAD_WEBHOOK.indexOf("[")!==0){ try{ fetch(CFG.LEAD_WEBHOOK,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(rec),keepalive:true}); }catch(e){} }
}
function waLink(){ const n=CFG.WHATSAPP_NUM.replace(/\D/g,""); return "https://wa.me/"+(n||"")+"?text="+encodeURIComponent("Oi! Fiz o diagnóstico dos 7 Furos do Escritório de Contratos e lembrei de você. Acho que ia te ajudar a parar de vazar margem na agência."); }
function pixel(ev,tag){ if(!CFG.PIXEL_ON) return; try{ if(window.fbq) fbq("track",ev,{content_name:tag}); }catch(e){} }
function bumpStat(k){ try{ const s=JSON.parse(localStorage.getItem("r01_stats")||"{}"); s[k]=(s[k]||0)+1; localStorage.setItem("r01_stats",JSON.stringify(s)); }catch(e){} }
function showAdmin(){
  document.getElementById("app").style.display="none"; const av=document.getElementById("admin-view"); av.style.display="block";
  const leads=JSON.parse(localStorage.getItem("r01_leads")||"[]"); const stats=JSON.parse(localStorage.getItem("r01_stats")||"{}");
  const acessos=stats.acessos||0,capt=leads.length,conv=acessos?Math.round(capt/acessos*100):0;
  document.getElementById("adm-kpis").innerHTML=[["Acessos",acessos],["Leads",capt],["Conclusão",conv+"%"],["Estrela média",capt?(leads.reduce((a,l)=>a+l.estrelas,0)/capt).toFixed(1):"—"]].map(k=>`<div class="adm-kpi"><div class="v">${k[1]}</div><div class="k">${k[0]}</div></div>`).join("");
  const keys=["escopo","caixa","acordo","margem"];
  document.getElementById("adm-dist").innerHTML=keys.map(k=>{const c=leads.filter(l=>l.perfil.furo===k).length;return `<div class="lead-row">${(RAIZ[k]||{}).leak} — <b>${c}</b> (${capt?Math.round(c/capt*100):0}%)</div>`}).join("")||"<p class='muted'>Sem dados.</p>";
  document.getElementById("adm-leads").innerHTML=capt?leads.slice().reverse().map(l=>{const c=l.contato||{};const wn=(c.wpp||"").replace(/\D/g,"");return `<div class="lead-row"><span class="stars">${"★".repeat(l.estrelas)}${"☆".repeat(5-l.estrelas)}</span> <b>${c.nome||"—"}</b> · ${c.email||"—"} · ${c.wpp||"—"} ${c.insta||""}<div style="margin:4px 0"><span class="tag">${l.acao}</span> <span class="tag">${(RAIZ[l.perfil.furo]||{}).leak||l.perfil.furo}</span> <span class="tag">${l.perfil.faturamento}</span> <span class="tag">disp ${l.perfil.disposicao}/10</span></div>${l.perfil.depoimento?`<div style="font-style:italic">“${l.perfil.depoimento}”</div>`:""}${wn?`<a class="wbtn" target="_blank" href="https://wa.me/55${wn}?text=${encodeURIComponent("Oi "+(c.nome||"").split(" ")[0]+"! Aqui é do Escritório de Contratos. Vi o seu diagnóstico dos 7 furos e queria trocar uma ideia rápida.")}">WhatsApp</a>`:""}</div>`}).join(""):"<p class='muted'>Nenhum lead ainda neste navegador.</p>";
}
function exportLeads(){
  const leads=JSON.parse(localStorage.getItem("r01_leads")||"[]"); if(!leads.length) return alert("Sem leads.");
  const cols=["data","estrelas","acao","nome","email","wpp","instagram","furo","banda","faturamento","disposicao","relacaoDesafio","depoimento"];
  const rows=leads.map(l=>[l.data,l.estrelas,l.acao,(l.contato||{}).nome,(l.contato||{}).email,(l.contato||{}).wpp,(l.contato||{}).insta,l.perfil.furo,l.perfil.banda,l.perfil.faturamento,l.perfil.disposicao,l.perfil.relacaoDesafio,(l.perfil.depoimento||"").replace(/\n/g," ")]);
  const csv=[cols.join(",")].concat(rows.map(r=>r.map(x=>`"${(x==null?"":x).toString().replace(/"/g,'""')}"`).join(","))).join("\n");
  const a=document.createElement("a"); a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv); a.download="leads_7furos.csv"; a.click();
}

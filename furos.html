function progress(){

}

function profile(){
  const sinais=Array.isArray(A.sinais)?A.sinais.length:0;
  let band=sinais<=2?"controlado":sinais<=4?"vazando":"hemorragia";
  if((A.rel==="vermelho"||A.rel==="escravo")&&band==="controlado") band="vazando";
  const current=Math.max(1,Math.round(2+(sinais/7)*8)); // poucos furos = nº baixo de vazamento
  const raiz=A.raiz||"escopo";
  const willing=(typeof A.disp==="number")?A.disp:5;
  return {raiz,band,sinais,current,willing,icp:A.icp||"",size:A.size||"",rel:A.rel||"",tentou:A.tentou||"",perda:A.crenca||"",livro:A.livro||"",antes:A.antes&&A.antes!=="x"?parseInt(A.antes,10):null,depo:A.depo||""};

function stars(p){
  let s=0;
  var _icp=({dono:25,socio:20,gestor:10,nao_tenho:0})[p.icp]; s+=(_icp===undefined?(MODE==="pos"?22:8):_icp);
  s+=({hemorragia:20,vazando:15,controlado:8})[p.band]||12;
  s+=({trabalhando:12,advogado:13,tentou:11,nunca:7})[p.tentou]||(MODE==="pos"?14:8);
  s+=Math.round((p.willing||5)*2);
  s+=({"50+":15,"15-50":12,"5-15":7,"ate5":3})[p.size]||(MODE==="pos"?8:6);
  if(p.livro==="leu"||p.livro==="lendo"||MODE==="pos") s+=10;       // alvo consultoria
  s+=5; if(p.perda==="50+"||p.perda==="10-50") s+=4;                 // já percebe a perda
  const star=s>=80?5:s>=65?4:s>=45?3:s>=30?2:1; return {score:s,star};
}
function action(p,st){
  if(MODE==="comprador") return "Acompanhar aplicação + consultoria (cliente)";
  if(MODE==="pos") return "Consultoria (Furo 7) + colher depoimento";
  if(p.livro==="leu"||p.livro==="lendo") return "Consultoria (Furo 7) + acompanhar";
  if((p.size==="50+"||p.size==="15-50")&&p.band!=="controlado") return "Desafio + ponte consultoria (agência maior)";
  if(p.willing<=3||st.star<=2) return "Nutrir (lead frio)";
  return "Vender o Desafio (R$37)";
}
function recommend(p){
  if(p.willing<=3) return {rec:false,txt:"Vou ser direto, porque o desafio inteiro é direto. Ele só funciona pra quem quer ENTENDER e CORRIGIR a própria margem — não pra quem quer empurrar o problema pra frente. Pela sua resposta, talvez agora não seja a sua hora. Quando for, ele vai estar aqui."};
  if(p.icp==="nao_tenho") return {rec:true,soft:true,txt:"Você ainda está começando, e o desafio fala da pele de quem já tem cliente vazando margem. Guarde pra quando os primeiros contratos chegarem — ou faça agora pra já começar sem os furos que quase todo dono leva anos pra fechar."};
  if(p.band==="controlado"&&p.willing<7) return {rec:true,soft:true,txt:"A sua agência ainda vaza pouco, e essa é a melhor hora de blindar. O desafio te dá as ferramentas pra manter a margem antes que os furos cresçam. Sem pressa, mas vale."};
  return {rec:true,soft:false,txt:"Sim. Este desafio é pra você, e é pra agora. O que você descreveu é exatamente o vazamento que ele estanca — com uma ferramenta pronta por furo, no eixo do seu caixa, não do seu advogado."};
}

  h+=`<p class="lead">Você tapou principalmente o <b>${r.leak}</b>. ${depois<=2?"O seu caixa hoje está bem protegido.":depois<=4?"Você estancou os maiores vazamentos.":"Ainda há furos abertos — e por isso o próximo passo importa."}</p>`;
  if(p.depo){ h+=`<div class="card"><span class="label">O que você nos contou</span><p style="margin:6px 0 0;font-style:italic">“${p.depo}”</p><p class="muted" style="margin-top:8px">Obrigado. Com a sua autorização, isso vira prova pra outro dono.</p></div>`; }
  h+=`<h3 style="margin-top:22px">O seu próximo furo é o mais caro: a precificação</h3><p>Você tapou os furos operacionais. Sobra o <b>Furo 7</b>, o estrutural — onde a margem é decidida. É exatamente o que a gente trabalha na consultoria, caso a caso.</p>
    <div class="cta-row" style="margin-top:8px"><a class="cta" href="${CFG.LINK_CONSULTORIA}" target="_blank" rel="noopener" onclick="pixel('Lead','cta_consultoria')">Quero conhecer a consultoria ›</a><a class="cta ghost" href="${waLink()}" target="_blank" rel="noopener">Indicar um amigo dono de agência ›</a><button class="cta ghost" onclick="window.print()">Salvar meu antes e depois (PDF)</button></div>
    <p class="foot-note">Espelho da sua percepção, não auditoria nem garantia. © Escritório de Contratos.</p></div>`;
  stage.innerHTML=h;
}
function renderResultComprador(p,st){
  const r=RAIZ[p.raiz]||RAIZ.escopo; const nome=(A.contato&&A.contato.nome)?A.contato.nome.split(" ")[0]:"";
  stage.innerHTML=`<div class="result"><div class="printhead"><span class="kicker">Mapa dos 7 Furos</span><h2>${r.nome}</h2></div>
    <span class="kicker">${nome?nome+", ":""}o seu mapa</span><h1 style="margin-top:8px">${r.nome}</h1><div class="rule"></div>
    <p class="lead">${BANDA_INTRO[p.band]}</p><p>${DIAG[p.raiz]}</p>
    <div class="darkcard"><span class="label">Nível de vazamento</span><div class="diagnum"><span class="big">${p.current}</span><span style="color:var(--text-on-dark-sub)">de 10</span></div><div class="gauge"><i style="left:${(p.current/10)*100}%"></i></div><div class="gauge-ends"><span style="color:var(--text-on-dark-sub)">caixa protegido</span><span style="color:var(--text-on-dark-sub)">hemorragia</span></div></div>
    <div class="card guide"><span class="label">Por onde começar a tapar</span><p style="margin:6px 0 0">Seu furo principal é o <b>${r.leak}</b> (${r.furos}).</p><ol>${GUIA[p.raiz].map(li=>`<li>${li}</li>`).join("")}</ol></div>
    <div class="qw"><span class="label" style="color:var(--gold-text)">Faça agora</span><p style="margin:8px 0 0">${QUICKWIN[p.raiz]}</p></div>
    <h3 style="margin-top:24px">Próximo passo do seu desafio</h3>${stepper(2)}
    <p>Com o mapa na mão, vá pra próxima ferramenta e comece a tapar o seu furo principal.</p>
    <div class="cta-row" style="margin-top:8px"><a class="cta" href="${CFG.LINK_AREA_MEMBROS}">Voltar ao desafio ›</a><button class="cta ghost" onclick="window.print()">Salvar meu mapa (PDF)</button></div>
    <p class="foot-note">Espelho do seu caixa, não auditoria nem garantia. © Escritório de Contratos.</p></div>`;
}

function saveLead(p,st){
  if(A._saved) return; A._saved=true;
  const rec={modo:MODE,data:nowISO(),inicio:startedAt,contato:A.contato||{},respostas:A,
    perfil:{furo:p.raiz,furoNome:(RAIZ[p.raiz]||{}).leak,banda:p.band,furosAbertos:p.sinais,vazamento:p.current,disposicao:p.willing,icp:p.icp,faturamento:p.size,sobra:p.rel,jaTentou:p.tentou,perdaPercebida:p.perda,relacaoDesafio:p.livro,antes:p.antes,depoimento:p.depo},
    estrelas:st.star,score:st.score,acao:action(p,st)};
  try{ const all=JSON.parse(localStorage.getItem("r01_leads")||"[]"); all.push(rec); localStorage.setItem("r01_leads",JSON.stringify(all)); }catch(e){}
  if(CFG.LEAD_WEBHOOK&&CFG.LEAD_WEBHOOK.indexOf("[")!==0){ try{ fetch(CFG.LEAD_WEBHOOK,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(rec),keepalive:true}); }catch(e){} }
}
function waLink(){ const n=CFG.WHATSAPP_NUM.replace(/\D/g,""); return "https://wa.me/"+(n||"")+"?text="+encodeURIComponent("Oi! Fiz o diagnóstico dos 7 Furos do Escritório de Contratos e lembrei de você. Acho que ia te ajudar a parar de vazar margem na agência."); }
function pixel(ev,tag){ if(!CFG.PIXEL_ON) return; try{ if(window.fbq) fbq("track",ev,{content_name:tag}); }catch(e){} }
function bumpStat(k){ try{ const s=JSON.parse(localStorage.getItem("r01_stats")||"{}"); s[k]=(s[k]||0)+1; localStorage.setItem("r01_stats",JSON.stringify(s)); }catch(e){} }
function showAdmin(){
  document.getElementById("app").style.display="none"; const av=document.getElementById("admin-view"); av.style.display="block";
  const leads=JSON.parse(localStorage.getItem("r01_leads")||"[]"); const stats=JSON.parse(localStorage.getItem("r01_stats")||"{}");
  const acessos=stats.acessos||0,capt=leads.length,conv=acessos?Math.round(capt/acessos*100):0;
  document.getElementById("adm-kpis").innerHTML=[["Acessos",acessos],["Leads",capt],["Conclusão",conv+"%"],["Estrela média",capt?(leads.reduce((a,l)=>a+l.estrelas,0)/capt).toFixed(1):"—"]].map(k=>`<div class="adm-kpi"><div class="v">${k[1]}</div><div class="k">${k[0]}</div></div>`).join("");
  const keys=["escopo","caixa","acordo","margem"];
  document.getElementById("adm-dist").innerHTML=keys.map(k=>{const c=leads.filter(l=>l.perfil.furo===k).length;return `<div class="lead-row">${(RAIZ[k]||{}).leak} — <b>${c}</b> (${capt?Math.round(c/capt*100):0}%)</div>`}).join("")||"<p class='muted'>Sem dados.</p>";
  document.getElementById("adm-leads").innerHTML=capt?leads.slice().reverse().map(l=>{const c=l.contato||{};const wn=(c.wpp||"").replace(/\D/g,"");return `<div class="lead-row"><span class="stars">${"★".repeat(l.estrelas)}${"☆".repeat(5-l.estrelas)}</span> <b>${c.nome||"—"}</b> · ${c.email||"—"} · ${c.wpp||"—"} ${c.insta||""}<div style="margin:4px 0"><span class="tag">${l.acao}</span> <span class="tag">${(RAIZ[l.perfil.furo]||{}).leak||l.perfil.furo}</span> <span class="tag">${l.perfil.faturamento}</span> <span class="tag">disp ${l.perfil.disposicao}/10</span></div>${l.perfil.depoimento?`<div style="font-style:italic">“${l.perfil.depoimento}”</div>`:""}${wn?`<a class="wbtn" target="_blank" href="https://wa.me/55${wn}?text=${encodeURIComponent("Oi "+(c.nome||"").split(" ")[0]+"! Aqui é do Escritório de Contratos. Vi o seu diagnóstico dos 7 furos e queria trocar uma ideia rápida.")}">WhatsApp</a>`:""}</div>`}).join(""):"<p class='muted'>Nenhum lead ainda neste navegador.</p>";
}
function exportLeads(){
  const leads=JSON.parse(localStorage.getItem("r01_leads")||"[]"); if(!leads.length) return alert("Sem leads.");
  const cols=["data","estrelas","acao","nome","email","wpp","instagram","furo","banda","faturamento","disposicao","relacaoDesafio","depoimento"];
  const rows=leads.map(l=>[l.data,l.estrelas,l.acao,(l.contato||{}).nome,(l.contato||{}).email,(l.contato||{}).wpp,(l.contato||{}).insta,l.perfil.furo,l.perfil.banda,l.perfil.faturamento,l.perfil.disposicao,l.perfil.relacaoDesafio,(l.perfil.depoimento||"").replace(/\n/g," ")]);
  const csv=[cols.join(",")].concat(rows.map(r=>r.map(x=>`"${(x==null?"":x).toString().replace(/"/g,'""')}"`).join(","))).join("\n");
  const a=document.createElement("a"); a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv); a.download="leads_7furos.csv"; a.click();
}
</script>
